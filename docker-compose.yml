version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: folia
      POSTGRES_USER: folia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-folia_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U folia"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-folia_dev_key}
    volumes:
      - searchdata:/meili_data
    ports:
      - "7700:7700"

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-folia}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-folia_dev}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://folia:${DB_PASSWORD:-folia_dev}@db:5432/folia
      - REDIS_URL=redis://redis:6379/0
      - MEILI_URL=http://meilisearch:7700
      - MEILI_KEY=${MEILI_KEY:-folia_dev_key}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-folia}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-folia_dev}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: always
    ports:
      - "5173:5173"

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - web
      - frontend

volumes:
  pgdata:
  searchdata:
  miniodata:
